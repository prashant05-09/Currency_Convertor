<!DOCTYPE html>
<html lang="en">
<head>
    <title>Project</title>
    <link rel="stylesheet" href="style.css">
    <script src="CurrencyConvertor.js" defer></script>
</head>
<body>
    <div id="root">
         <h1>Currency Convertor Project</h1>
        <section>
            <span>From</span>
            <select name="" id="fromCurrency">
            </select>
            <input type="number" placeholder="Enter amount" id="amount">
            <span>Convert to</span>
            <select name="" id="toCurrency">
            </select>
            <button id="btn">Convert</button>
            <input type="number" placeholder="Converted amount" id="convertedAmount" disabled>
        </section>
    </div>    
</body>
</html>
